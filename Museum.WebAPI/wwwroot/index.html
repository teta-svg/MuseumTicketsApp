<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Античный музей</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="banner">
        <h1>Добро пожаловать в Античный музей</h1>
        <p>Выберите выставку и купите билет онлайн</p>
    </div>
    <nav>
        <button id="loginBtn">Вход</button>
        <button id="registerBtn">Регистрация</button>
        <button id="logoutBtn" style="display:none;">Выход</button>
    </nav>
</header>

<section class="filters">
    <input type="text" id="filterName" placeholder="Название выставки">
    <input type="text" id="filterMuseum" placeholder="Название музея">
    <input type="text" id="filterComplex" placeholder="Название комплекса">
    <input type="date" id="filterStart">
    <input type="date" id="filterEnd">
    <input type="number" id="filterMinPrice" placeholder="Мин цена">
    <input type="number" id="filterMaxPrice" placeholder="Макс цена">
    <button id="applyFilters">Применить</button>
</section>

<section id="exhibitionsContainer" class="catalog"></section>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeLogin">&times;</span>
        <h2>Вход</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="loginSubmit">Войти</button>
    </div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeRegister">&times;</span>
        <h2>Регистрация</h2>
        <input type="text" id="regFirstName" placeholder="Имя">
        <input type="text" id="regLastName" placeholder="Фамилия">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Пароль">
        <button id="registerSubmit">Зарегистрироваться</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
